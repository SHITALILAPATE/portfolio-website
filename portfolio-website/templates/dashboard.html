{% extends "base.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<section class="section">

  <div class="row-between">

    <div>
      <p class="eyebrow purple">admin</p>
      <h2>
        Project <span class="gradient-text">dashboard</span>
      </h2>
    </div>

    <a href="{{ url_for('main.new_project') }}" class="btn-neon">
      + New Project
    </a>

  </div>

  <div class="grid-3 mt-3">

    {% for p in projects %}

      <article class="glass-card project">

        <div class="project-img">

          <img
            src="{{ url_for('static', filename='images/' ~ p.image) }}"
            alt="{{ p.title }}"
           onerror="this.src='/static/images/project1.png'"
          >

        </div>

        <div class="pad">

          <h3>{{ p.title }}</h3>

          <p class="muted small">
            {{ p.description }}
          </p>

          <div class="chips">

            {% for tech in p.tech_stack.split(',') %}

              <span class="tag">
                {{ tech.strip() }}
              </span>

            {% endfor %}

          </div>

          <div class="project-cta">

            <a
              class="btn-ghost small"
              href="{{ url_for('main.edit_project', pid=p.id) }}"
            >
              Edit
            </a>

            <form
              method="POST"
              action="{{ url_for('main.delete_project', pid=p.id) }}"
              onsubmit="return confirm('Delete this project?');"
              style="flex:1"
            >

              <button
                class="btn-ghost small danger w-full"
                type="submit"
              >
                Delete
              </button>

            </form>

          </div>

        </div>

      </article>

    {% endfor %}

  </div>

</section>

{% endblock %}
