{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="section auth-section">
  <div class="glass-card pad auth-card">
    <h2>Welcome <span class="gradient-text">back</span></h2>
    <p class="muted small">Log in to manage your portfolio.</p>
    <form method="POST" class="auth-form">
      {{ form.hidden_tag() }}
      <label>Username {{ form.username(maxlength=80) }}</label>
      <label>Password {{ form.password(maxlength=128) }}</label>
      {{ form.submit(class_="btn-neon w-full") }}
    </form>
    <p class="muted small center mt-2">No account? <a href="{{ url_for('auth.signup') }}">Sign up</a></p>
  </div>
</section>
{% endblock %}
