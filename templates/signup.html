{% extends "base.html" %}
{% block title %}Sign up{% endblock %}
{% block content %}
<section class="section auth-section">
  <div class="glass-card pad auth-card">
    <h2>Create your <span class="gradient-text">account</span></h2>
    <form method="POST" class="auth-form">
      {{ form.hidden_tag() }}
      <label>Username {{ form.username(maxlength=80) }}</label>
      <label>Email {{ form.email(maxlength=150) }}</label>
      <label>Password {{ form.password(maxlength=128) }}</label>
      <label>Confirm {{ form.confirm(maxlength=128) }}</label>
      {{ form.submit(class_="btn-neon w-full") }}
    </form>
    <p class="muted small center mt-2">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</section>
{% endblock %}
